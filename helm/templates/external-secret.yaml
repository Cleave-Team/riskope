{{- if .Values.externalSecret.enabled -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "riskope.secretName" . }}
  labels:
    {{- include "riskope.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef.name }}
    kind: {{ .Values.externalSecret.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: {{ include "riskope.secretName" . }}
    creationPolicy: {{ .Values.externalSecret.target.creationPolicy | default "Owner" }}
  {{- if .Values.externalSecret.data }}
  data:
    {{- toYaml .Values.externalSecret.data | nindent 4 }}
  {{- end }}
  {{- if .Values.externalSecret.dataFrom }}
  dataFrom:
    {{- toYaml .Values.externalSecret.dataFrom | nindent 4 }}
  {{- end }}
{{- end }}
